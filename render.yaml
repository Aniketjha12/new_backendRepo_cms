services:
  - type: web
    name: skm-classes-backend
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /graphql
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: skm-classes-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*" # Update this with your frontend URL later for better security

databases:
  - name: skm-classes-db
    plan: free
    region: frankfurt
